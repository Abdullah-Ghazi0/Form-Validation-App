<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Validation</title>
        <link rel="stylesheet" href="style.css" />
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
        <h1>Registration Form</h1>
        <form action="">
            <div class="group">
                <label for="fullName">Name:</label>
                <input type="text" name="fullName" id="fullName" placeholder="Enter your Full Name" class="field" autocomplete="off">
                <span id="full-name-er" class="error"></span>
            </div>

            <div class="group">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" placeholder="Enter username" autocomplete="username" class="field">
                <span id="username-er" class="error"></span>
            </div>

            <div class="group">
                <label for="gender">Gender:</label>
                <select name="gender" id="gender" class="field">
                    <option value="">--Select a Gender--</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="others">Others</option>
                </select>
                <span id="gender-er" class="error"></span>
            </div>

            <div class="group">
                <label for="phone">Phone no:</label>
                <input type="tel" name="phone" id="phone" placeholder="0300 0000000" autocomplete="tel" class="field">
                <span id="phone-er" class="error"></span>
            </div>
            
            <div class="group">
                <label for="dob">Date of birth:</label>
                <input type="date" name="dob" id="dob" class="field">
                <span id="dob-er" class="error"></span>
            </div>

            <div class="group">
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="Enter your e-mail" autocomplete="email" class="field">
                <span id="email-er" class="error"></span>
            </div>

            <div id="pw" class="group">
                <div>
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter password" autocomplete="new-password" class="field">
                </div>
                <div class="group">
                    <label for="conf-password">Confirm Password:</label>
                    <input type="password" name="conf-password" id="conf-password" placeholder="Confirm password" autocomplete="new-password" class="field">

                    <button id="show-pw" type="button">Show</button>
                    <span id="password-er" class="error"></span>
                </div>

            </div>

            <div class="group" id="accountTypeBox">
                <p>Account Type:</p>
                <label for="at-user">
                    <input type="radio" id="at-user" name="accountType" value="users">
                    User
                </label>
                <label for="at-admin">
                    <input type="radio" id="at-admin" name="accountType" value="admin">
                    Admin
                </label>
                <label for="at-dev">
                    <input type="radio" id="at-dev" name="accountType" value="dev">
                    Developer
                </label>
                <span id="accountType-er" class="error"></span>
            </div>

            <div class="group">
                <div class="agree">
                    <label for="agree">I agree to Terms and agreement:</label>
                    <input type="checkbox" name="agree" id="agree">
                </div>
                <span id="agree-er" class="error"></span>
            </div>

            <div class="group">
                <label for="img">Picture:</label>
                <input type="file" name="img" id="img" accept="image/*">
                <span id="img-er" class="error"></span>
            </div>

            <button type="submit" id="submit">Register</button>

        </form>
        </div>
        <script src="script.js" defer></script>
    </body>
</html>
