<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Validation</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <br />
        <h3>Register Form</h3>
        <br>
        <form action="">
            <div>
                <label for="fullName">Name:</label>
                <input type="text" name="fullName" id="fullName" placeholder="Enter your Full Name">
                <span id="full-name-er"></span>
            </div>

            <div>
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" placeholder="Enter username" autocomplete="username">
                <span id="username-er"></span>
            </div>

            <div>
                <label for="gender">Gender:</label>
                <select name="gender" id="gender">
                    <option value="">--Select a Gender--</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="others">Others</option>
                    <option value="non">Prefer not to say</option>
                </select>
                <span id="gender-er"></span>
            </div>
            <div>
                <label for="phone">Phone no:</label>
                <input type="tel" name="phone" id="phone" placeholder="0300 0000000" autocomplete="tel">
                <span id="phone-er"></span>
            </div>
            
            <div>
                <label for="dob">Date of birth:</label>
                <input type="date" name="dob" id="dob">
                <span id="dob-er"></span>
            </div>

            <div>
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="Enter your e-mail" autocomplete="email">
                <span id="email-er"></span>
            </div>

            <div>
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Enter password" autocomplete="new-password">
                <label for="conf-password">Confirm Password:</label>
                <input type="password" name="conf-password" id="conf-password" placeholder="Confirm password" autocomplete="new-password">
                <span id="password-er"></span>
            </div>

            <div>
                <p>Account Type:</p>
                <label for="at-user">
                    <input type="radio" id="at-user" name="accountType" value="users">
                    User
                </label>
                <label for="at-admin">
                    <input type="radio" id="at-admin" name="accountType" value="admin">
                    Admin
                </label>
                <label for="at-dev">
                    <input type="radio" id="at-dev" name="accountType" value="dev">
                    Developer
                </label>
                <span id="accountType-er"></span>
            </div>

            <div>
                <label for="agree">I agree to Terms and agreement:</label>
                <input type="checkbox" name="agree" id="agree">
                <span id="agree-er"></span>
            </div>

            <div>
                <label for="img">Picture:</label>
                <input type="file" name="img" id="img" accept="image/*">
                <span id="img-er"></span>
            </div>

            <button type="submit">Register</button>

        </form>
        <script src="script.js" defer></script>
    </body>
</html>
